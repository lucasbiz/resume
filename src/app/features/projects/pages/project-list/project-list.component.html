<div class="min-h-screen bg-gray-50 dark:bg-slate-900 transition-colors duration-200">
  <div class="container mx-auto px-4 py-8 max-w-4xl">
    <header class="mb-8 flex items-center justify-between animate-fade-in-up">
      <h1 class="text-4xl font-bold text-gray-900 dark:text-white">Projects</h1>
      <button
        (click)="refresh()"
        class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 dark:bg-blue-500 dark:hover:bg-blue-600 text-white text-sm font-semibold py-2 px-4 rounded transition-colors"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        Refresh
      </button>
    </header>

    @if (projects$ | async; as projects) {
      @if (projects.length > 0) {
        <div class="grid md:grid-cols-2 gap-6 animate-fade-in-up [animation-delay:150ms] opacity-0 [animation-fill-mode:forwards]">
          @for (project of projects; track project.id) {
            <app-project-card [project]="project" />
          }
        </div>
      } @else {
        <div class="text-center py-20 animate-fade-in-up">
          <p class="text-gray-500 dark:text-gray-400 text-lg">No projects found.</p>
          <p class="text-gray-400 dark:text-gray-500 text-sm mt-2">
            Repositories with the "portfolio" topic will appear here.
          </p>
        </div>
      }
    } @else {
      <div class="grid md:grid-cols-2 gap-6">
        @for (_ of [1,2,3,4]; track _) {
          <app-project-skeleton />
        }
      </div>
    }
  </div>
</div>
